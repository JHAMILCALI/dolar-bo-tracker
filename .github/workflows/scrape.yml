name: Scrape Dólar Bolivia

on:
  schedule:
    - cron: "0 */2 * * *"   # cada 2 horas
  workflow_dispatch:         # ejecución manual desde GitHub

permissions:
  contents: write           

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Instalar dependencias del scraper
        run: pip install -r scripts/requirements.txt

      - name: Instalar Playwright y Chromium
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Ejecutar scraper
        run: python scripts/scrape.py
        env:
          OUTPUT_PATH: public/data/db.json

      - name: Verificar si hubo cambios en db.json
        id: check_changes
        run: |
          git diff --quiet public/data/db.json || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit y push si hubo cambios
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name  "JHAMILCALI"
          git config user.email "jhamilquea@gmail.com"
          git add public/data/db.json
          git commit -m "chore(data): actualizar precios dólar Bolivia [$(date -u +'%Y-%m-%d %H:%M UTC')]"
          git push
